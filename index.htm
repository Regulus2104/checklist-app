<script>
const LISTAS_BASE = {
  "Cosas del colegio": [
    "Casaca de buzo","Pantalon de buzo","3 polos manga larga","3 polos manga corta",
    "Short","Polera","2 pares de medias","Gorro","Toalla de aseo","Bolsa de aseo",
    "Pañitos húmedos","Mandil para pintura","Mochila","Lonchera","Tapers de lonchera",
    "Cubierto","Toma todos","Carnet naranja de salida","Cuadernos",
    "Cartuchera llena con lo faltante","Libros","Folder marron","Tareas físicas"
  ],
  "Cosas de la natación": [
    "Shorts de ropa de baño","Polo de ropa de baño","Gorro","Lentes",
    "Carnet de asistencia","Toalla de baño","Sandalias de baño"
  ],
  "Cosas de la terapia": [
    "Folder naranja","Tareas desarrolladas"
  ],
  "Cosas propias diarias": [
    "Plantillas para los zapato","Vitaminas","Los libros preferidos","Juguetes que llevará"
  ]
};

// cargar listas guardadas o usar base
let listas = JSON.parse(localStorage.getItem("listas")) || structuredClone(LISTAS_BASE);
let estado = JSON.parse(localStorage.getItem("checklist")) || {};

function guardarListas() {
  localStorage.setItem("listas", JSON.stringify(listas));
}

function render() {
  const contenedor = document.getElementById("contenedor");
  contenedor.innerHTML = "";

  Object.keys(listas).forEach(lista => {
    const titulo = document.createElement("h3");
    titulo.textContent = lista;
    contenedor.appendChild(titulo);

    // input agregar item
    const inputDiv = document.createElement("div");
    inputDiv.innerHTML = `
      <input type="text" id="input-${lista}" placeholder="Agregar item">
      <button onclick="agregarItem('${lista}')">➕ Agregar</button>
    `;
    contenedor.appendChild(inputDiv);

    const tabla = document.createElement("table");
    tabla.innerHTML = `
      <tr>
        <th>Item</th>
        <th>Si</th>
        <th>No</th>
        <th>Observaciones</th>
        <th>Eliminar</th>
      </tr>
    `;

    listas[lista].forEach((item, index) => {
      const key = lista + "|" + item;

      const val = estado[key]?.valor || "";
      const obs = estado[key]?.obs || "";

      const row = tabla.insertRow();

      row.innerHTML = `
        <td>${item}</td>
        <td class="clickable ${val === 'Si' ? 'si' : ''}" onclick="marcar('${key}','Si')">✔</td>
        <td class="clickable ${val === 'No' ? 'no' : ''}" onclick="marcar('${key}','No')">✖</td>
        <td><input type="text" value="${obs}" oninput="guardarObs('${key}', this.value)"></td>
        <td><button onclick="eliminarItem('${lista}', ${index})">🗑</button></td>
      `;
    });

    contenedor.appendChild(tabla);
  });
}

function agregarItem(lista) {
  const input = document.getElementById("input-" + lista);
  const valor = input.value.trim();
  if (!valor) return;

  listas[lista].push(valor);
  guardarListas();
  input.value = "";
  render();
}

function eliminarItem(lista, index) {
  const item = listas[lista][index];
  const key = lista + "|" + item;

  listas[lista].splice(index, 1);
  delete estado[key];

  guardarListas();
  localStorage.setItem("checklist", JSON.stringify(estado));
  render();
}

function marcar(key, valor) {
  if (!estado[key]) estado[key] = {};
  estado[key].valor = valor;
  localStorage.setItem("checklist", JSON.stringify(estado));
  render();
}

function guardarObs(key, texto) {
  if (!estado[key]) estado[key] = {};
  estado[key].obs = texto;
  localStorage.setItem("checklist", JSON.stringify(estado));
}

function limpiar() {
  localStorage.removeItem("checklist");
  localStorage.removeItem("listas");

  listas = structuredClone(LISTAS_BASE);
  estado = {};

  render();
}

function descargar() {
  let contenido = "Lista,Item,Estado,Observacion\n";

  Object.keys(estado).forEach(key => {
    if (estado[key].valor === "Si") {
      const [lista, item] = key.split("|");
      const obs = estado[key].obs || "";
      contenido += `${lista},${item},Si,${obs}\n`;
    }
  });

  let blob = new Blob([contenido], { type: 'text/csv' });
  let url = URL.createObjectURL(blob);

  let a = document.createElement("a");
  a.href = url;
  a.download = "checklist.csv";
  a.click();

  URL.revokeObjectURL(url);
}

render();
</script>
